# 强制修改 Kitty 终端类型，解决在 CLI/SSH 等环境下的冲突问题
term xterm-256color

# 兼容性修复：强制使用 XWayland 解决 NVIDIA 显卡在 Wayland 下的 EGL 闪退问题
linux_display_server x11

# 统一字体 (与 Ghostty 一致)
font_family Maple Mono NF
font_size 12

# 视觉效果
background_opacity 0.65
window_padding_width 15
hide_window_decorations yes

# 光标样式
cursor_shape block
cursor_blink_interval 0.5

# ----------------------------------------------------
# 核心视觉效果：光标彗星拖影特效 (Kitty 独占视觉体验)
# ----------------------------------------------------
cursor_trail 1
cursor_trail_decay 0.1 0.3

# ----------------------------------------------------
# 消除烦人的闪烁 (关闭终端出错或回车时的边框闪烁/视觉铃声)
# ----------------------------------------------------
visual_bell_duration 0.0
window_alert_on_bell no

# ----------------------------------------------------
# 修复终端颜色热重载问题 (允许外部程序动态注入 16 色画板)
# ----------------------------------------------------
allow_remote_control yes
listen_on unix:/tmp/mykitty-{kitty_pid}

# ----------------------------------------------------
# 输入与渲染延迟优化 (提升响应速度，使输入更跟手)
# ----------------------------------------------------
repaint_delay 8
input_delay 2
sync_to_monitor yes

# ----------------------------------------------------
# 网页超链接智能识别与样式 (Catppuccin Macchiato 风格波浪线)
# ----------------------------------------------------
detect_urls yes
url_color #8aadf4
url_style curly
